<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Regulated Waters</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="240" height="360"></canvas>

    <div id="hud">
      <span id="level-label">Level 1</span>
      <span id="score">Score: 0</span>
      <div id="health-bar">
        <div id="health-bar-fill"></div>
      </div>
      <span id="best">Best: 0</span>
    </div>

    <div id="banner" class="hidden"></div>

    <div id="start-screen" class="overlay-screen">
      <div class="card">
        <h1>Regulated Waters</h1>
        <canvas id="title-fish-canvas" width="180" height="80"></canvas>
        <p>Migrate as native Australian fish through highly modified rivers.</p>
        <p>Dodge obstacles and collect objects.</p>
        <p>Reach the spawning grounds to win!</p>
        <button id="start-button" class="overlay-button">Tap or press Space to start</button>
      </div>
    </div>

    <div id="game-over-screen" class="overlay-screen hidden">
      <div class="card">
        <h1>Game Over</h1>
        <p id="final-score">Score: 0</p>
        <button id="restart-button" class="overlay-button">Tap or press Space to restart</button>
      </div>
    </div>

    <div id="level-complete-screen" class="overlay-screen hidden">
      <div class="card">
        <h1 id="level-complete-title">Level Complete!</h1>
        <p id="level-complete-body"></p>
        <button id="continue-button" class="overlay-button">Tap or press Space to continue</button>
      </div>
    </div>

    <div id="win-screen" class="overlay-screen hidden">
      <div class="card">
        <h1>You made it through the regulated river!</h1>
        <p id="win-score">Score: 0</p>
        <button id="win-restart-button" class="overlay-button">Tap or press Space to play again</button>
      </div>
    </div>

    <div id="touch-controls">
      <div id="touch-left" class="touch-zone"></div>
      <div id="touch-right" class="touch-zone"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
