<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Fish Game: Regulated River</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="game-container">
    <canvas id="game-canvas" width="240" height="360"></canvas>

    <div id="hud">
      <span id="score">Score: 0</span>
      <div id="health-bar">
        <div id="health-bar-fill"></div>
      </div>
      <span id="best">Best: 0</span>
    </div>

    <div id="banner" class="hidden"></div>

    <div id="start-screen" class="overlay-screen">
      <h1>Regulated River</h1>
      <p>You're a golden perch swimming upstream.</p>
      <p>Dodge obstacles and eat crabs for health.</p>
      <p>Reach the floodplain to win!</p>
      <button id="start-button" class="overlay-button">Tap or press Space to start</button>
    </div>

    <div id="game-over-screen" class="overlay-screen hidden">
      <h1>Game Over</h1>
      <p id="final-score">Score: 0</p>
      <button id="restart-button" class="overlay-button">Tap or press Space to restart</button>
    </div>

    <div id="win-screen" class="overlay-screen hidden">
      <h1>You made it to the floodplain!</h1>
      <p id="win-score">Score: 0</p>
      <button id="win-restart-button" class="overlay-button">Tap or press Space to play again</button>
    </div>

    <div id="touch-controls">
      <div id="touch-left" class="touch-zone"></div>
      <div id="touch-right" class="touch-zone"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
